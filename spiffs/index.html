<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32小车遥控</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        h1 { margin: 0 0 16px; }

        .layout {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            align-items: flex-start;
        }

        /* ── 视频区域 ── */
        .video-panel {
            flex: 1;
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #videoStream {
            width: 100%;
            max-width: 320px;
            height: 240px;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
            display: block;
        }

        .video-status {
            font-size: 12px;
            opacity: 0.75;
        }

        /* ── 控制区域 ── */
        .control-panel {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .status {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
        }

        .connected    { background: rgba(76,175,80,0.3);  border: 2px solid #4CAF50; }
        .disconnected { background: rgba(244,67,54,0.3);  border: 2px solid #f44336; }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        button {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

        .keys { width: 100%; }
        .key-hint {
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 5px 0;
            font-size: 13px;
            transition: all 0.1s;
        }
        .active-key { background: rgba(255,255,0,0.3); transform: scale(1.03); }

        #messageLog {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 10px;
            height: 110px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            font-family: monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>🚗 ESP32小车遥控</h1>

    <div class="layout">
        <!-- 视频 -->
        <div class="video-panel">
            <img id="videoStream" alt="视频流">
            <div class="video-status" id="videoStatus">视频未连接</div>
        </div>

        <!-- 控制 -->
        <div class="control-panel">
            <div id="cmdStatus" class="status disconnected">指令未连接</div>

            <div class="btn-row">
                <button onclick="connectAll()">连接</button>
                <button onclick="disconnectAll()">断开</button>
            </div>

            <div class="keys">
                <div id="keyW" class="key-hint">W — 前进</div>
                <div id="keyS" class="key-hint">S — 后退</div>
                <div id="keyA" class="key-hint">A — 左转</div>
                <div id="keyD" class="key-hint">D — 右转</div>
                <div class="key-hint">松开 — 停止</div>
            </div>

            <div id="messageLog"></div>
        </div>
    </div>

    <script>
        const ESP32_IP = window.location.hostname;

        /* ── 工具 ── */
        function addLog(msg) {
            const log = document.getElementById('messageLog');
            const t = new Date().toLocaleTimeString();
            log.innerHTML += `[${t}] ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        /* ── 指令 WebSocket (/ws) ── */
        let cmdWs = null;

        function setCmdStatus(ok) {
            const el = document.getElementById('cmdStatus');
            el.textContent = ok ? '指令已连接' : '指令未连接';
            el.className   = 'status ' + (ok ? 'connected' : 'disconnected');
        }

        function connectCmd() {
            if (cmdWs && cmdWs.readyState === WebSocket.OPEN) return;
            cmdWs = new WebSocket(`ws://${ESP32_IP}/ws`);
            cmdWs.onopen    = () => { setCmdStatus(true);  addLog('✅ 指令连接成功'); };
            cmdWs.onmessage = (e) => addLog(`← ${e.data}`);
            cmdWs.onclose   = () => {
                setCmdStatus(false);
                addLog('❌ 指令连接断开，3s 后重连...');
                setTimeout(connectCmd, 3000);
            };
            cmdWs.onerror = () => addLog('❌ 指令连接错误');
        }

        function sendCommand(cmd) {
            if (cmdWs && cmdWs.readyState === WebSocket.OPEN) {
                cmdWs.send(cmd);
                addLog(`→ ${cmd}`);
            }
        }

        /* ── 视频 WebSocket (/video) ── */
        let videoWs = null;
        let videoEnabled = false;

        function setVideoStatus(msg) {
            document.getElementById('videoStatus').textContent = msg;
        }

        function connectVideo() {
            if (!videoEnabled) return;
            if (videoWs && videoWs.readyState === WebSocket.OPEN) return;

            videoWs = new WebSocket(`ws://${ESP32_IP}/video`);
            videoWs.binaryType = 'blob';
            setVideoStatus('视频连接中...');

            videoWs.onopen = () => setVideoStatus('视频已连接');

            videoWs.onmessage = (e) => {
                const url = URL.createObjectURL(e.data);
                const img = document.getElementById('videoStream');
                img.onload = () => URL.revokeObjectURL(url);
                img.src = url;
            };

            videoWs.onclose = () => {
                setVideoStatus('视频未连接');
                if (videoEnabled) setTimeout(connectVideo, 3000);
            };

            videoWs.onerror = () => setVideoStatus('视频连接错误');
        }

        /* ── 连接 / 断开 全部 ── */
        function connectAll() {
            videoEnabled = true;
            connectCmd();
            connectVideo();
        }

        function disconnectAll() {
            videoEnabled = false;
            if (cmdWs)   { cmdWs.onclose = null;   cmdWs.close();   cmdWs = null; }
            if (videoWs) { videoWs.onclose = null;  videoWs.close(); videoWs = null; }
            setCmdStatus(false);
            setVideoStatus('视频未连接');
            addLog('手动断开');
        }

        /* ── 键盘控制 ── */
        const KEY_MAP = { w: 'forward_start', s: 'backward_start',
                          a: 'left_start',    d: 'right_start' };
        const KEY_EL  = { w: 'keyW', s: 'keyS', a: 'keyA', d: 'keyD' };
        let isMoving = false;

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const key = e.key.toLowerCase();
            if (!KEY_MAP[key]) return;
            if (!isMoving && sendCommand(KEY_MAP[key])) {
                isMoving = true;
                document.getElementById(KEY_EL[key]).classList.add('active-key');
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (!KEY_MAP[key]) return;
            sendCommand('stop');
            isMoving = false;
            Object.values(KEY_EL).forEach(id =>
                document.getElementById(id).classList.remove('active-key'));
        });

        window.onblur = () => {
            if (isMoving) { sendCommand('stop'); isMoving = false; }
        };

        window.onload = () => addLog('页面就绪，点击"连接"开始');
    </script>
</body>
</html>
