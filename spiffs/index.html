<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32小车遥控</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        
        .video-container {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        #videoStream {
            width: 100%;
            max-width: 640px;
            height: auto;
            display: block;
            background: #000;
        }
        
        .video-placeholder {
            width: 100%;
            max-width: 640px;
            height: 480px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }
        
        .status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .connected {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid #4CAF50;
        }
        
        .disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 2px solid #f44336;
        }
        
        .controls {
            margin: 30px 0;
        }
        
        .key-hint {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .active-key {
            background: rgba(255, 255, 0, 0.3);
            transform: scale(1.05);
            transition: all 0.1s;
        }
        
        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        #messageLog {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 ESP32小车遥控</h1>
        
        <div class="video-container">
            <img id="videoStream" src="" alt="Video Stream">
        </div>
        
        <div id="status" class="status disconnected">
            未连接
        </div>
        
        <button onclick="connectWebSocket()">连接小车</button>
        <button onclick="disconnectWebSocket()">断开连接</button>
        
        <div class="controls">
            <h3>控制说明</h3>
            <div id="keyW" class="key-hint">W - 前进</div>
            <div id="keyS" class="key-hint">S - 后退</div>
            <div id="keyA" class="key-hint">A - 左转</div>
            <div id="keyD" class="key-hint">D - 右转</div>
            <div class="key-hint">松开任意键 - 停止</div>
        </div>
        
        <div id="messageLog"></div>
    </div>

    <script>
        let websocket = null;
        let isMoving = false;
        
        // 修改这里的IP地址为你的ESP32地址
        const ESP32_IP = '192.168.2.110';
        
        function addLog(message) {
            const log = document.getElementById('messageLog');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] ${message}<br>`;
            log.scrollTop = log.scrollHeight;
        }
        
        function updateStatus(connected) {
            const statusEl = document.getElementById('status');
            if (connected) {
                statusEl.textContent = '已连接';
                statusEl.className = 'status connected';
            } else {
                statusEl.textContent = '未连接';
                statusEl.className = 'status disconnected';
            }
        }
        
        function connectWebSocket() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                addLog('已经连接了！');
                return;
            }
            
            addLog('正在连接到小车...');
            websocket = new WebSocket(`ws://${ESP32_IP}/ws`);
            
            websocket.onopen = function(event) {
                addLog('✅ 连接成功！');
                updateStatus(true);
            };
            
            websocket.onmessage = function(event) {
                addLog(`收到消息: ${event.data}`);
            };
            
            websocket.onclose = function(event) {
                addLog('❌ 连接断开');
                updateStatus(false);
                // 3秒后自动重连
                setTimeout(() => {
                    if (websocket && websocket.readyState === WebSocket.CLOSED) {
                        addLog('尝试自动重连...');
                        connectWebSocket();
                    }
                }, 3000);
            };
            
            websocket.onerror = function(event) {
                addLog(`❌ 连接错误: ${event.message || '无法连接到服务器'}`);
                console.error('WebSocket error:', event);
                updateStatus(false);
            };
        }
        
        function disconnectWebSocket() {
            if (websocket) {
                websocket.close();
                websocket = null;
                addLog('手动断开连接');
                updateStatus(false);
            }
        }
        
        function sendCommand(command) {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(command);
                addLog(`发送命令: ${command}`);
                return true;
            } else {
                addLog('⚠️ 未连接，无法发送命令');
                return false;
            }
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return; // 忽略按键重复
            
            const key = e.key.toLowerCase();
            let command = '';
            let keyElement = null;
            
            switch(key) {
                case 'w':
                    command = 'forward_start';
                    keyElement = document.getElementById('keyW');
                    break;
                case 's':
                    command = 'backward_start';
                    keyElement = document.getElementById('keyS');
                    break;
                case 'a':
                    command = 'left_start';
                    keyElement = document.getElementById('keyA');
                    break;
                case 'd':
                    command = 'right_start';
                    keyElement = document.getElementById('keyD');
                    break;
                default:
                    return; // 不处理其他按键
            }
            
            if (!isMoving && sendCommand(command)) {
                isMoving = true;
                if (keyElement) {
                    keyElement.classList.add('active-key');
                }
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 's', 'a', 'd'].includes(key)) {
                sendCommand('stop');
                isMoving = false;
                
                // 移除所有按键高亮
                ['keyW', 'keyS', 'keyA', 'keyD'].forEach(id => {
                    document.getElementById(id).classList.remove('active-key');
                });
            }
        });
        
        // 页面加载完成后自动连接
        window.onload = function() {
            addLog('页面加载完成，请点击连接按钮');
            startVideoStream();
        };
        
        function startVideoStream() {
            const videoImg = document.getElementById('videoStream');
            videoImg.src = `http://${ESP32_IP}/stream`;
            addLog('视频流已启动');
        }
        
        // 页面失去焦点时停止小车（安全考虑）
        window.onblur = function() {
            if (isMoving) {
                sendCommand('stop');
                isMoving = false;
            }
        };
    </script>
</body>
</html>
